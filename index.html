<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이미지 텍스트 레이어 에디터</title>
<style>
  :root{
    --bg:#111417; --panel:#1a1f24; --panel2:#20262c;
    --line:#2c343c; --ink:#e8ecef; --sub:#8a949e;
    --accent:#4fd1a5; --accent-ink:#0c211a; --warn:#f6c453;
    --mono:'SF Mono',Consolas,'Malgun Gothic',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,'Pretendard','Malgun Gothic',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

  header{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--line);flex-shrink:0}
  header h1{font-size:15px;font-weight:700;letter-spacing:-.2px}
  header .badge{font:11px var(--mono);color:var(--accent);border:1px solid var(--accent);border-radius:99px;padding:2px 8px}
  header .res{margin-left:auto;font:12px var(--mono);color:var(--sub)}

  main{flex:1;display:flex;min-height:0}

  #stage{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;min-width:0;position:relative}
  #dropzone{border:2px dashed var(--line);border-radius:12px;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:.2s;text-align:center;padding:20px}
  #dropzone:hover,#dropzone.drag{border-color:var(--accent);background:rgba(79,209,165,.04)}
  #dropzone .big{font-size:38px}
  #dropzone p{color:var(--sub)}
  #dropzone strong{color:var(--ink)}
  #canvasWrap{display:none;max-width:100%;max-height:100%;position:relative}
  #canvas{max-width:100%;max-height:calc(100vh - 160px);display:block;border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.5)}

  .box{position:absolute;border:1.5px solid var(--accent);border-radius:3px;cursor:move;background:rgba(79,209,165,.06)}
  .box .tag{position:absolute;top:-19px;left:-1px;background:var(--accent);color:var(--accent-ink);font:10px/1 var(--mono);padding:3px 6px;border-radius:3px;font-weight:700;pointer-events:none}
  .box .grip{position:absolute;right:-6px;bottom:-6px;width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:nwse-resize}
  .box.edited{border-color:var(--warn);background:rgba(246,196,83,.08)}
  .box.edited .tag,.box.edited .grip{background:var(--warn)}

  #loading{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(17,20,23,.85);z-index:5;border-radius:12px}
  #loading .spin{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  #loading span{font:12px var(--mono);color:var(--sub)}

  aside{width:340px;flex-shrink:0;border-left:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column}
  aside .head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  aside .head h2{font-size:13px;font-weight:700}
  aside .head small{font:11px var(--mono);color:var(--sub)}
  .cmd{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
  .cmd label{font-size:12px;font-weight:700;color:var(--accent)}
  .cmd textarea{background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--ink);padding:8px 10px;font-size:13px;resize:vertical;outline:none;font-family:inherit}
  .cmd textarea:focus{border-color:var(--accent)}
  #btnCommand{background:var(--accent);color:var(--accent-ink);padding:9px}
  .hint{font-size:11px;color:var(--sub);padding:8px 16px;border-bottom:1px solid var(--line);line-height:1.6}
  #layers{flex:1;overflow-y:auto;padding:10px}
  #layers:empty::after{content:"이미지를 업로드하면\AAI가 텍스트를 읽어 레이어로 표시합니다";white-space:pre;display:block;text-align:center;color:var(--sub);padding:40px 0;font-size:12px;line-height:1.8}

  .layer{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:8px;transition:border-color .15s}
  .layer.edited{border-color:var(--warn)}
  .layer .row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .layer .num{font:10px var(--mono);font-weight:700;color:var(--accent-ink);background:var(--accent);border-radius:3px;padding:2px 6px}
  .layer.edited .num{background:var(--warn)}
  .layer .orig{font:11px var(--mono);color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .layer input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--ink);padding:8px 10px;font-size:13px;outline:none}
  .layer input:focus{border-color:var(--accent)}
  .layer input::placeholder{color:#5c666f}

  .actions{padding:12px 16px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
  button{border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .1s,opacity .15s}
  button:active{transform:scale(.98)}
  button:disabled{opacity:.35;cursor:default}
  #btnPreview{background:var(--accent);color:var(--accent-ink)}
  #btnReset{background:var(--panel2);color:var(--sub);border:1px solid var(--line)}
  #btnDownload{background:var(--warn);color:#231a04;display:none}

  @media (max-width:760px){
    main{flex-direction:column}
    aside{width:100%;border-left:none;border-top:1px solid var(--line);max-height:45vh}
    #canvas{max-height:40vh}
  }
</style>
</head>
<body>

<header>
  <h1>이미지 텍스트 레이어 에디터</h1>
  <span class="badge">AI 인식 · 원본 해상도 유지</span>
  <span class="res" id="resInfo"></span>
</header>

<main>
  <div id="stage">
    <div id="dropzone">
      <div class="big">🖼️</div>
      <p><strong>이미지를 드래그하거나 클릭해서 업로드</strong></p>
      <p>디자인 폰트·배너 텍스트도 AI가 읽습니다 (한국어·영어)</p>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>
    <div id="canvasWrap">
      <canvas id="canvas"></canvas>
      <div id="overlay" style="position:absolute;inset:0"></div>
    </div>
    <div id="loading">
      <div class="spin"></div>
      <span id="loadMsg">AI가 텍스트를 읽는 중…</span>
    </div>
  </div>

  <aside>
    <div class="head">
      <h2>텍스트 레이어</h2>
      <small id="layerCount"></small>
    </div>
    <div class="cmd">
      <label>🪄 AI 명령 모드 — 명령어 한 줄로 이미지 전체 변환</label>
      <textarea id="cmdInput" rows="2" placeholder="예: 이미지의 한국어 텍스트만 일본어로 번역해서 바꿔줘. 디자인은 그대로 유지해."></textarea>
      <button id="btnCommand" disabled>AI로 생성하기</button>
    </div>
    <div class="hint">💡 또는 아래 레이어 모드: 이미지 위 초록 박스를 <b>드래그해서 이동</b>, 우하단 점으로 <b>크기 조절</b>할 수 있어요. 박스가 텍스트를 정확히 덮도록 맞춘 뒤 미리보기를 누르면, 수정한 부분만 AI가 다시 그려요.</div>
    <div id="layers"></div>
    <div class="actions">
      <button id="btnPreview" disabled>미리보기 — 텍스트 교체 적용</button>
      <button id="btnDownload">⬇ 이미지 다운로드 (원본 해상도)</button>
      <button id="btnReset" disabled>원본으로 되돌리기</button>
    </div>
  </aside>
</main>

<script>
const $=id=>document.getElementById(id);
const canvas=$('canvas'), ctx=canvas.getContext('2d',{willReadFrequently:true});
let img=new Image(), lines=[], originalName='image';

/* ── 업로드 ── */
const dz=$('dropzone');
dz.onclick=()=>$('fileInput').click();
$('fileInput').onchange=e=>{ if(e.target.files[0]) loadFile(e.target.files[0]); };
['dragover','dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{
  e.preventDefault();
  dz.classList.toggle('drag',ev==='dragover');
  if(ev==='drop'&&e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
}));

function loadFile(file){
  originalName=file.name.replace(/\.[^.]+$/,'');
  img=new Image();
  img.onload=()=>{
    canvas.width=img.naturalWidth;   // ★ 원본 해상도 그대로
    canvas.height=img.naturalHeight;
    ctx.drawImage(img,0,0);
    $('resInfo').textContent=img.naturalWidth+' × '+img.naturalHeight+'px';
    dz.style.display='none';
    $('canvasWrap').style.display='block';
    $('overlay').style.display='block';
    $('btnDownload').style.display='none';
    runAI();
    $('btnCommand').disabled=false;
  };
  img.src=URL.createObjectURL(file);
}

/* ── AI 텍스트 인식: 버셀 서버 함수(/api/ocr) 호출 ── */
async function runAI(){
  $('loading').style.display='flex'; $('loadMsg').textContent='AI가 텍스트를 읽는 중…';
  $('layers').innerHTML=''; $('overlay').innerHTML=''; lines=[];
  try{
    const MAX=1568, s=Math.min(1,MAX/Math.max(canvas.width,canvas.height));
    const tmp=document.createElement('canvas');
    tmp.width=Math.round(canvas.width*s); tmp.height=Math.round(canvas.height*s);
    tmp.getContext('2d').drawImage(canvas,0,0,tmp.width,tmp.height);
    const b64=tmp.toDataURL('image/jpeg',0.9).split(',')[1];

    const res=await fetch('/api/ocr',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image:b64})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error);

    lines=data.lines.map((l,i)=>({
      id:i, text:l.text, newText:'',
      bbox:{ x0:l.x/100*canvas.width, y0:l.y/100*canvas.height,
             x1:(l.x+l.w)/100*canvas.width, y1:(l.y+l.h)/100*canvas.height }
    }));
    buildLayers();
  }catch(err){
    alert('텍스트 인식 실패: '+err.message);
  }
  $('loading').style.display='none';
}

/* ── 레이어 패널 ── */
function buildLayers(){
  const L=$('layers'); L.innerHTML='';
  $('layerCount').textContent=lines.length+'개';
  lines.forEach(l=>{
    const d=document.createElement('div');
    d.className='layer'; d.id='layer-'+l.id;
    d.innerHTML=`
      <div class="row">
        <span class="num">${String(l.id+1).padStart(2,'0')}</span>
        <span class="orig" title="${esc(l.text)}">${esc(l.text)}</span>
      </div>
      <input type="text" placeholder="${esc(l.text)}" data-id="${l.id}">`;
    d.querySelector('input').addEventListener('input',e=>{
      l.newText=e.target.value;
      d.classList.toggle('edited',!!l.newText);
      const box=$('box-'+l.id);
      if(box) box.classList.toggle('edited',!!l.newText);
    });
    L.appendChild(d);
  });
  drawBoxes();
  $('btnPreview').disabled=lines.length===0;
  $('btnReset').disabled=false;
}

/* ── 드래그·리사이즈 가능한 박스 ── */
function drawBoxes(){
  const o=$('overlay'); o.innerHTML='';
  const sx=canvas.clientWidth/canvas.width, sy=canvas.clientHeight/canvas.height;
  lines.forEach(l=>{
    const d=document.createElement('div');
    d.className='box'; d.id='box-'+l.id;
    setBoxCss(d,l,sx,sy);
    d.innerHTML=`<span class="tag">${String(l.id+1).padStart(2,'0')}</span><span class="grip"></span>`;
    o.appendChild(d);
    enableDrag(d,l);
  });
}
function setBoxCss(d,l,sx,sy){
  const b=l.bbox;
  d.style.left=(b.x0*sx)+'px'; d.style.top=(b.y0*sy)+'px';
  d.style.width=((b.x1-b.x0)*sx)+'px'; d.style.height=((b.y1-b.y0)*sy)+'px';
}
function enableDrag(d,l){
  let mode=null, start=null;
  d.addEventListener('pointerdown',e=>{
    mode = e.target.classList.contains('grip') ? 'resize' : 'move';
    start={x:e.clientX,y:e.clientY,b:{...l.bbox}};
    d.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  d.addEventListener('pointermove',e=>{
    if(!mode) return;
    const sx=canvas.clientWidth/canvas.width, sy=canvas.clientHeight/canvas.height;
    const dx=(e.clientX-start.x)/sx, dy=(e.clientY-start.y)/sy;
    if(mode==='move'){
      const w=start.b.x1-start.b.x0, h=start.b.y1-start.b.y0;
      l.bbox.x0=start.b.x0+dx; l.bbox.y0=start.b.y0+dy;
      l.bbox.x1=l.bbox.x0+w;   l.bbox.y1=l.bbox.y0+h;
    }else{
      l.bbox.x1=Math.max(start.b.x0+10,start.b.x1+dx);
      l.bbox.y1=Math.max(start.b.y0+10,start.b.y1+dy);
    }
    setBoxCss(d,l,sx,sy);
  });
  d.addEventListener('pointerup',()=>{ mode=null; });
}
window.addEventListener('resize',()=>{ if(lines.length&&$('overlay').style.display!=='none') drawBoxes(); });

/* ── 미리보기: 수정한 텍스트 영역만 잘라 Gemini 생성형 편집 후 원위치에 합성 ── */
$('btnPreview').onclick=async()=>{
  const targets=lines.filter(l=>l.newText&&l.newText!==l.text);
  if(!targets.length){ alert('수정할 텍스트를 먼저 입력해주세요.'); return; }
  $('loading').style.display='flex';
  ctx.drawImage(img,0,0); // 원본에서 시작
  try{
    for(let i=0;i<targets.length;i++){
      const l=targets[i];
      $('loadMsg').textContent=`AI 이미지 생성 중… (${i+1}/${targets.length})`;
      // 1) 텍스트 영역 + 여유 마진 크롭 (배경 문맥 포함)
      const b=l.bbox, mh=(b.y1-b.y0)*0.5, mw=(b.x1-b.x0)*0.15;
      const cx=Math.max(0,Math.round(b.x0-mw)), cy=Math.max(0,Math.round(b.y0-mh));
      const cw=Math.min(canvas.width-cx,Math.round((b.x1-b.x0)+mw*2));
      const ch=Math.min(canvas.height-cy,Math.round((b.y1-b.y0)+mh*2));
      const crop=document.createElement('canvas');
      // API 전송용: 긴 변 1024 이하로
      const s=Math.min(1,2048/Math.max(cw,ch));
      crop.width=Math.round(cw*s); crop.height=Math.round(ch*s);
      crop.getContext('2d').drawImage(canvas,cx,cy,cw,ch,0,0,crop.width,crop.height);
      const b64=crop.toDataURL('image/png').split(',')[1];
      // 2) Gemini 편집 요청
      const res=await fetch('/api/edit',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({image:b64,original:l.text,replacement:l.newText,cropW:cw,cropH:ch})});
      const data=await res.json();
      if(data.error) throw new Error(data.error);
      // 3) 결과를 원래 크롭 자리에 정확히 합성 (원본 해상도 유지)
      await new Promise((ok,bad)=>{
        const gi=new Image();
        gi.onload=()=>{ ctx.drawImage(gi,0,0,gi.width,gi.height,cx,cy,cw,ch); ok(); };
        gi.onerror=bad;
        gi.src='data:'+data.mime+';base64,'+data.image;
      });
    }
    $('btnDownload').style.display='block';
    $('overlay').style.display='none';
  }catch(err){
    alert('이미지 생성 실패: '+err.message);
    ctx.drawImage(img,0,0);
  }
  $('loading').style.display='none';
};

/* ── AI 명령 모드: 이미지 전체 + 명령 한 줄 → 통째로 재생성 ── */
$('btnCommand').onclick=async()=>{
  const instruction=$('cmdInput').value.trim();
  if(!instruction){ alert('명령어를 입력해주세요. 예: 한국어 텍스트만 일본어로 바꿔줘'); return; }
  $('loading').style.display='flex';
  $('loadMsg').textContent='AI가 이미지 전체를 생성 중… (10~30초)';
  try{
    // 입력용 축소 사본 (원본 캔버스는 유지)
    const MAX=2048, s=Math.min(1,MAX/Math.max(canvas.width,canvas.height));
    const tmp=document.createElement('canvas');
    tmp.width=Math.round(canvas.width*s); tmp.height=Math.round(canvas.height*s);
    tmp.getContext('2d').drawImage(img,0,0,tmp.width,tmp.height);
    const b64=tmp.toDataURL('image/jpeg',0.92).split(',')[1];

    const res=await fetch('/api/command',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image:b64,instruction,imgW:canvas.width,imgH:canvas.height})});
    const data=await res.json();
    if(data.error) throw new Error(data.error);

    await new Promise((ok,bad)=>{
      const gi=new Image();
      gi.onload=()=>{
        // 결과를 원본 캔버스 크기에 꽉 채워 배치 (최종 파일 해상도 = 원본과 동일)
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const sc=Math.max(canvas.width/gi.width,canvas.height/gi.height);
        const dw=gi.width*sc, dh=gi.height*sc;
        ctx.drawImage(gi,(canvas.width-dw)/2,(canvas.height-dh)/2,dw,dh);
        ok();
      };
      gi.onerror=bad;
      gi.src='data:'+data.mime+';base64,'+data.image;
    });
    $('btnDownload').style.display='block';
    $('overlay').style.display='none';
  }catch(err){
    alert('생성 실패: '+err.message);
  }
  $('loading').style.display='none';
};

/* ── 되돌리기 / 다운로드 ── */
$('btnReset').onclick=()=>{
  ctx.drawImage(img,0,0);
  lines.forEach(l=>{ l.newText=''; });
  document.querySelectorAll('.layer input').forEach(i=>i.value='');
  document.querySelectorAll('.layer,.box').forEach(e=>e.classList.remove('edited'));
  $('overlay').style.display='block';
  drawBoxes();
  $('btnDownload').style.display='none';
};

$('btnDownload').onclick=()=>{
  const a=document.createElement('a');
  a.download=originalName+'_edited.png';
  a.href=canvas.toDataURL('image/png');
  a.click();
};

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
</script>
</body>
</html>
